<!DOCTYPE html>

<div class="frame">

    <div class="section">

      <div class="subsection active">
        <div class="sub-header"><span class="tri">▾</span> Datos laborales básicos <span class="req">(*)</span></div>
        <div class="sub-body">

          <div class="field-grid cols-3">
            <div class="field">
              <label>Cod. colaborador <span class="req">*</span></label>
              <input type="text" value="1">
            </div>
            <div class="field"></div>
            <div class="field">
              <label>Primer fecha de ingreso</label>
              <span class="readonly-line">01/04/2020</span>
            </div>

            <div class="field">
              <label>Fec. ingreso <span class="req">*</span></label>
              <input type="date" value="2020-04-01">
            </div>
            <div class="field">
              <label>Fec. ingreso vacaciones <span class="req">*</span></label>
              <input type="date" value="2021-01-04">
            </div>
            <div class="field">
              <label>Fec. ingreso antigüedad vacaciones <span class="req">*</span></label>
              <input type="date" value="2021-01-04">
            </div>

            <div class="field">
              <label>Fec. ingreso caja salud <span class="req">*</span></label>
              <input type="date" value="2020-04-01">
            </div>
            <div class="field">
              <label>Fec. ingreso para bono de antigüedad <span class="req">*</span></label>
              <input type="date" value="2021-01-04">
            </div>
            <div class="field">
              <label>Días de antigüedad adicional <span class="req">*</span></label>
              <input type="number" value="0">
            </div>

            <div class="field">
              <label>Motivo de movimiento de ingreso <span class="req">*</span></label>
              <select>
                <option value="">&lt;SELECCIONE&gt;</option>
                <option selected>NO ESPECIFICADO</option>
                <option>Renuncia 110</option>
              </select>
            </div>
            <div class="field"></div>
            <div class="field"></div>

            <div class="field">
              <label>Modalidad de trabajo <span class="req">*</span></label>
              <select>
                <option value="">&lt;SELECCIONE&gt;</option>
                <option>No especificado</option>
                <option selected>Presencial</option>
                <option>Remoto</option>
                <option>Semipresencial</option>
              </select>
            </div>
            <div class="field">
              <label>Teléfono fijo</label>
              <input type="text" value="3-403030">
            </div>
            <div class="field">
              <label>Teléfono móvil</label>
              <input type="text">
            </div>

            <div class="field full">
              <label>Correo <span class="req">*</span></label>
              <input type="email" value="aurquiza@fassil.com.bo">
            </div>

            <div class="field full">
              <label>Dirección</label>
              <input type="text">
            </div>

            <div class="field">
              <label>Fecha egreso</label>
              <span class="readonly-line">----</span>
            </div>
            <div class="field">
              <label>Estado</label>
              <span class="readonly-line">Activo</span>
            </div>
